name: FCD-meld-b200-new

channels:
  - conda-forge
  - defaults

dependencies:
  # ---- core ----
  - python=3.10
  - pip
  - setuptools
  - wheel

  # ---- BLAS / numeric ----
  - libopenblas>=0.3.21
  - numpy>=1.24
  - scipy
  - scikit-learn
  - scikit-image>=0.21
  - pandas>=2.0
  - h5py>=3.9

  # ---- utils ----
  - matplotlib>=3.7
  - seaborn>=0.12
  - pytest>=7.4
  - jupyterlab>=4.0
  - tqdm
  - pyyaml
  - libtiff
  - fpdf=1.7.2

  # ---- neuro / medical ----
  - nibabel>=5.1
  - nilearn>=0.10.2
  - simpleitk

  - pip:
      # ======================
      # PyTorch (Blackwell)
      # ======================
      # - --pre
      # - torch
      # - torchvision
      # - torchaudio
      # - --index-url https://download.pytorch.org/whl/nightly/cu124

      # ======================
      # PyG (nightly-compatible)
      # ======================
      # - torch-geometric
      # - torch-scatter
      # - torch-sparse
      # - torch-cluster
      # - torch-spline-conv

      # ======================
      # ML / DL
      # ======================
      # - pytorch-lightning>=2.4
      # - torchmetrics>=1.4
      # - monai>=1.3
      # - captum>=0.6
      # - transformers>=4.44

      # ======================
      # neuro / fs
      # ======================
      # - potpourri3d==0.0.6
      # - lapy==0.6.0
      # - pybids>=0.16
      # - neuroCombat==0.2.12

      # ======================
      # stats
      # ======================
      # - patsy>=0.5
      # - progressbar2>=4.2
      # - statsmodels>=0.14
      # - matplotlib_surface_plotting==0.10

      # ======================
      # api
      # ======================
      # - fastapi
      # - uvicorn
