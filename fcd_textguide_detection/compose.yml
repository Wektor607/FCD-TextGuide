services:
  fcd_textguide_detection:
    build: .
    image: meldproject/fcd_textguide_detection:latest
    platform: "linux/amd64"
    runtime: nvidia
    tty: true
    stdin_open: true
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - FS_LICENSE=/run/secrets/license.txt
      - MELD_LICENSE=/run/secrets/meld_license.txt
    volumes:
      - {YOUR_PATH}/fcd_textguide_detection/data:/data # Change on your local path
    secrets:
      - license.txt
      - meld_license.txt
    user: $DOCKER_USER
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

secrets:
  license.txt:
    file: ./license.txt
  meld_license.txt:
    file: ./meld_license.txt
